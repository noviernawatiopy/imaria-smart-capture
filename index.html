<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMARIA Smart Capture</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>📷 IMARIA Smart Capture</h1>
    <p>Version 1.0</p>
  </header>

  <main>

    <div id="reader" style="display:none;"></div>

<div id="hasilQR" style="display:none;">
  Belum ada QR yang terbaca
</div>

   <button id="btnFoto">
      📷 Ambil Foto Lembar Jawaban
    </button>

    <input
      type="file"
      id="fotoJawaban"
      accept="image/*"
      capture="environment"
      style="display:none;">
<img
  id="previewFoto"
  style="display:none;width:100%;margin-top:16px;border-radius:8px;">
    <div id="status">
      Menunggu kamera...
    </div>
<div id="aksiFoto" style="display:none; margin-top:16px;">

  <button id="btnUlang">
    🔄 Ambil Ulang
  </button>

 <button id="btnUpload">
  ⬆ Upload & Proses OCR
</button>

</div>

  </main>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="app.js"></script>

</body>
</html>
