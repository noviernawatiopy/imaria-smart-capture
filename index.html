<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMARIA Smart Capture</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>📷 IMARIA Smart Capture</h1>
    <p>Version 1.0</p>
  </header>

  <main>

    <div id="reader"></div>

    <div id="hasilQR">
      Belum ada QR yang terbaca
    </div>

    <button id="btnFoto" style="display:none;">
      📷 Foto Lembar Jawaban
    </button>

    <input
      type="file"
      id="fotoJawaban"
      accept="image/*"
      capture="environment"
      style="display:none;">
<img
  id="previewFoto"
  style="display:none;width:100%;margin-top:16px;border-radius:8px;">
    <div id="status">
      Menunggu kamera...
    </div>

    <button id="btnStart">
      Buka Kamera
    </button>

  </main>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="app.js"></script>

</body>
</html>
