<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMARIA Smart Capture</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>📷 IMARIA Smart Capture</h1>
    <p>Version 2.0</p>
  </header>

  <main>

    <button id="btnFoto">
      📷 Ambil Foto Lembar Jawaban
    </button>

    <input
      type="file"
      id="fotoJawaban"
      accept="image/*"
      capture="environment"
      style="display:none;">

    <img
      id="previewFoto"
      style="display:none;width:100%;margin-top:16px;border-radius:12px;">

    <div id="status">
      Silakan ambil foto lembar jawaban.
    </div>

    <div id="aksiFoto" style="display:none; margin-top:16px;">

      <button id="btnUlang">
        🔄 Ambil Ulang
      </button>

      <button id="btnUpload">
        ⬆ Upload & Proses OCR
      </button>

    </div>

  </main>

  <script src="app.js"></script>

</body>
</html>
