<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMARIA Smart Capture</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📷 IMARIA Smart Capture</h1>
  <p>Versi 2.0</p>
</header>

<main>

  <button id="btnFoto">
    📷 Ambil Foto Lembar Jawaban
  </button>

  <input
    type="file"
    id="fotoJawaban"
    accept="image/*"
    capture="environment"
    hidden>

  <img
    id="previewFoto"
    alt="Preview Foto">

  <div id="status">
    Silakan ambil foto lembar jawaban.
  </div>

  <div id="aksiFoto">

    <button id="btnUlang">
      🔄 Ambil Ulang
    </button>

    <button id="btnUpload">
      ⬆ Upload &amp; Proses
    </button>

  </div>

</main>

<script src="app.js"></script>

</body>
</html>
